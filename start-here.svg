  <rect x="720" y="128" width="280" height="7" rx="3.5" fill="#34A853"/>
  <circle cx="756" cy="176" r="18" fill="#E6F4EA"/>
  <text x="756" y="182" font-size="18" font-weight="800" fill="#34A853" text-anchor="middle">3</text>
  <g stroke="#34A853" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M912 160 h44 a6 6 0 0 1 6 6 v20 a6 6 0 0 1 -6 6 h-30 l-14 10 v-10 a6 6 0 0 1 0 -32 z"/>
  </g>
  <path d="M934 170 l3 6 6 3 -6 3 -3 6 -3 -6 -6 -3 6 -3 z" fill="#FBBC04"/>
  <text x="756" y="238" font-size="20" font-weight="700" fill="#202124">Follow your Buddy</text>
  <text x="756" y="266" font-size="14.5" fill="#5F6368">It installs the team, then</text>
  <text x="756" y="287" font-size="14.5" fill="#5F6368">hands you the keys.</text>

  <text x="40" y="378" font-size="14" font-weight="700" letter-spacing="0.6" fill="#5F6368">BY THE END, YOUR TEAM</text>

  <g font-size="14.5" font-weight="700">
    <rect x="40"  y="398" width="150" height="42" rx="21" fill="#E8F0FE"/>
    <text x="115" y="424" fill="#1967D2" text-anchor="middle">Chief of Staff</text>

    <rect x="202" y="398" width="96" height="42" rx="21" fill="#FCE8E6"/>
    <text x="250" y="424" fill="#C5221F" text-anchor="middle">CFO</text>

    <rect x="310" y="398" width="104" height="42" rx="21" fill="#FEF7E0"/>
    <text x="362" y="424" fill="#9A6C00" text-anchor="middle">CPTO</text>

    <rect x="426" y="398" width="100" height="42" rx="21" fill="#E6F4EA"/>
    <text x="476" y="424" fill="#137333" text-anchor="middle">CISO</text>

    <rect x="538" y="398" width="98" height="42" rx="21" fill="#E8F0FE"/>
    <text x="587" y="424" fill="#1967D2" text-anchor="middle">CGO</text>

    <rect x="648" y="398" width="100" height="42" rx="21" fill="#FCE8E6"/>
    <text x="698" y="424" fill="#C5221F" text-anchor="middle">CMO</text>

    <text x="768" y="424" font-size="14.5" font-weight="400" fill="#5F6368">All free, all yours.</text>
