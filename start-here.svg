<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 516" font-family="-apple-system, Segoe UI, Roboto, Helvetica, sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#202124" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#F8F9FA"/>
    </linearGradient>
    <linearGradient id="teambar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4285F4"/><stop offset="0.5" stop-color="#34A853"/><stop offset="1" stop-color="#FBBC04"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1040" height="516" rx="24" fill="url(#bg)"/>
  <rect x="0" y="0" width="1040" height="6" fill="url(#teambar)"/>

  <text x="40" y="62" font-size="31" font-weight="800" fill="#202124">Your leadership team, in about 5 minutes</text>
  <text x="40" y="92" font-size="16" fill="#5F6368">Free. Nothing to install beyond your AI. Three steps.</text>

  <g filter="url(#soft)">
    <rect x="828" y="40" width="172" height="40" rx="20" fill="#FFFFFF" stroke="#DADCE0"/>
  </g>
  <circle cx="854" cy="60" r="7" fill="#EA4335"/>
  <text x="870" y="65" font-size="15" font-weight="700" fill="#202124">Built for Claude</text>

  <g filter="url(#soft)">
    <rect x="716" y="88" width="284" height="34" rx="17" fill="#FFFFFF" stroke="#DADCE0"/>
  </g>
  <circle cx="740" cy="105" r="6" fill="#34A853"/>
  <text x="756" y="110" font-size="14" font-weight="700" fill="#202124">New free drop every Tuesday</text>

  <g filter="url(#soft)">
    <rect x="40" y="128" width="280" height="196" rx="18" fill="#FFFFFF" stroke="#E8EAED"/>
  </g>
  <rect x="40" y="128" width="280" height="7" rx="3.5" fill="#4285F4"/>
  <circle cx="76" cy="176" r="18" fill="#E8F0FE"/>
  <text x="76" y="182" font-size="18" font-weight="800" fill="#4285F4" text-anchor="middle">1</text>
  <g stroke="#4285F4" stroke-width="3.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="244" y1="158" x2="244" y2="188"/>
    <polyline points="232,177 244,189 256,177"/>
    <path d="M226 198 h36"/>
  </g>
  <text x="76" y="238" font-size="20" font-weight="700" fill="#202124">Download the folder</text>
  <text x="76" y="266" font-size="14.5" fill="#5F6368">Grab the drop from GitHub</text>
  <text x="76" y="287" font-size="14.5" fill="#5F6368">and unzip it. Team inside.</text>

  <g stroke="#FBBC04" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="340,214 360,226 340,238"/>
  </g>

  <g filter="url(#soft)">
    <rect x="380" y="128" width="280" height="196" rx="18" fill="#FFFFFF" stroke="#E8EAED"/>
  </g>
