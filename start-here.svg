  <text x="416" y="238" font-size="20" font-weight="700" fill="#202124">Open Start Here.txt</text>
  <text x="416" y="266" font-size="14.5" fill="#5F6368">Copy the text inside, paste</text>
  <text x="416" y="287" font-size="14.5" fill="#5F6368">it into a new Claude chat.</text>

  <g stroke="#FBBC04" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="680,214 700,226 680,238"/>
  </g>

