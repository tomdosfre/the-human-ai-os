  <line x1="40" y1="470" x2="1000" y2="470" stroke="#E8EAED" stroke-width="1.5"/>
  <text x="40" y="497" font-size="13.5" fill="#5F6368">A free drop from a working leadership-team system.</text>
  <rect x="812" y="480" width="22" height="22" rx="5" fill="#0A66C2"/>
  <text x="823" y="496" font-size="12.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">in</text>
  <text x="1000" y="496" font-size="15" font-weight="600" fill="#202124" text-anchor="end">Tomás Dostal Freire</text>
