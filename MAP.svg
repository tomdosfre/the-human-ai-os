<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="-apple-system, Segoe UI, Roboto, Helvetica, sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#202124" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#F8F9FA"/>
    </linearGradient>
    <linearGradient id="teambar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4285F4"/><stop offset="0.5" stop-color="#34A853"/><stop offset="1" stop-color="#FBBC04"/>
    </linearGradient>
    <style>.mono { font-family: 'Roboto Mono', ui-monospace, monospace; }</style>
  </defs>

  <rect x="0" y="0" width="1200" height="700" rx="24" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#teambar)"/>

  <!-- header -->
  <text x="60" y="92" font-size="30" font-weight="800" fill="#202124">One system, revealed one free drop at a time</text>
  <text x="60" y="124" font-size="16" fill="#5F6368">Six free drops. Each one lights the next. A new free drop, every Tuesday.</text>

  <!-- cadence pill top-right -->
  <g filter="url(#soft)">
    <rect x="930" y="74" width="210" height="32" rx="16" fill="#FFFFFF" stroke="#DADCE0"/>
  </g>
  <circle cx="952" cy="90" r="6" fill="#34A853"/>
  <text x="968" y="95" font-size="13" font-weight="700" fill="#202124">New drop every Tuesday</text>

  <!-- timeline -->
  <line x1="135" y1="300" x2="1065" y2="300" stroke="#DADCE0" stroke-width="3"/>

  <!-- Node 1 : LIVE -->
  <circle cx="135" cy="300" r="30" fill="#4285F4"/>
  <text x="135" y="308" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle">1</text>
  <g filter="url(#soft)"><rect x="60" y="352" width="150" height="176" rx="18" fill="#E8F0FE" stroke="#D2E3FC"/></g>
  <rect x="60" y="352" width="150" height="7" rx="3.5" fill="#4285F4"/>
  <text x="135" y="432" font-size="15" font-weight="700" fill="#202124" text-anchor="middle">The leadership</text>
  <text x="135" y="453" font-size="15" font-weight="700" fill="#202124" text-anchor="middle">team</text>
  <rect x="80" y="474" width="110" height="22" rx="11" fill="#FFFFFF"/>
  <text x="135" y="489" font-size="10" class="mono" font-weight="700" fill="#1967D2" text-anchor="middle" letter-spacing="0.5">YOU ARE HERE</text>

  <!-- Node 2 -->
  <circle cx="321" cy="300" r="22" fill="#FFFFFF" stroke="#DADCE0" stroke-width="2"/>
  <text x="321" y="306" font-size="15" font-weight="700" fill="#5F6368" text-anchor="middle">2</text>
  <g filter="url(#soft)"><rect x="246" y="352" width="150" height="176" rx="18" fill="#FFFFFF" stroke="#E8EAED"/></g>
  <rect x="246" y="352" width="150" height="7" rx="3.5" fill="#EA4335"/>
  <text x="321" y="432" font-size="15" font-weight="700" fill="#202124" text-anchor="middle">The Decision</text>
  <text x="321" y="453" font-size="15" font-weight="700" fill="#202124" text-anchor="middle">Ledger</text>
  <text x="321" y="489" font-size="10" class="mono" fill="#5F6368" text-anchor="middle" letter-spacing="0.5">DROP 02 · NEXT</text>

  <!-- Node 3 -->
  <circle cx="507" cy="300" r="22" fill="#FFFFFF" stroke="#DADCE0" stroke-width="2"/>
  <text x="507" y="306" font-size="15" font-weight="700" fill="#5F6368" text-anchor="middle">3</text>
  <g filter="url(#soft)"><rect x="432" y="352" width="150" height="176" rx="18" fill="#FFFFFF" stroke="#E8EAED"/></g>
  <rect x="432" y="352" width="150" height="7" rx="3.5" fill="#FBBC04"/>
  <text x="507" y="432" font-size="15" font-weight="700" fill="#202124" text-anchor="middle">The memory</text>
  <text x="507" y="453" font-size="15" font-weight="700" fill="#202124" text-anchor="middle">system</text>
  <text x="507" y="489" font-size="10" class="mono" fill="#5F6368" text-anchor="middle" letter-spacing="0.5">DROP 03</text>

  <!-- Node 4 -->
  <circle cx="693" cy="300" r="22" fill="#FFFFFF" stroke="#DADCE0" stroke-width="2"/>
  <text x="693" y="306" font-size="15" font-weight="700" fill="#5F6368" text-anchor="middle">4</text>
  <g filter="url(#soft)"><rect x="618" y="352" width="150" height="176" rx="18" fill="#FFFFFF" stroke="#E8EAED"/></g>
  <rect x="618" y="352" width="150" height="7" rx="3.5" fill="#34A853"/>
  <text x="693" y="432" font-size="15" font-weight="700" fill="#202124" text-anchor="middle">Scheduled</text>
  <text x="693" y="453" font-size="15" font-weight="700" fill="#202124" text-anchor="middle">runs</text>
  <text x="693" y="489" font-size="10" class="mono" fill="#5F6368" text-anchor="middle" letter-spacing="0.5">DROP 04</text>

  <!-- Node 5 -->
  <circle cx="879" cy="300" r="22" fill="#FFFFFF" stroke="#DADCE0" stroke-width="2"/>
  <text x="879" y="306" font-size="15" font-weight="700" fill="#5F6368" text-anchor="middle">5</text>
  <g filter="url(#soft)"><rect x="804" y="352" width="150" height="176" rx="18" fill="#FFFFFF" stroke="#E8EAED"/></g>
  <rect x="804" y="352" width="150" height="7" rx="3.5" fill="#4285F4"/>
  <text x="879" y="432" font-size="15" font-weight="700" fill="#202124" text-anchor="middle">Session</text>
  <text x="879" y="453" font-size="15" font-weight="700" fill="#202124" text-anchor="middle">rituals</text>
  <text x="879" y="489" font-size="10" class="mono" fill="#5F6368" text-anchor="middle" letter-spacing="0.5">DROP 05</text>

  <!-- Node 6 -->
  <circle cx="1065" cy="300" r="22" fill="#FFFFFF" stroke="#DADCE0" stroke-width="2"/>
  <text x="1065" y="306" font-size="15" font-weight="700" fill="#5F6368" text-anchor="middle">6</text>
  <g filter="url(#soft)"><rect x="990" y="352" width="150" height="176" rx="18" fill="#FFFFFF" stroke="#E8EAED"/></g>
  <rect x="990" y="352" width="150" height="7" rx="3.5" fill="#EA4335"/>
  <text x="1065" y="432" font-size="15" font-weight="700" fill="#202124" text-anchor="middle">A working</text>
  <text x="1065" y="453" font-size="15" font-weight="700" fill="#202124" text-anchor="middle">recap</text>
  <text x="1065" y="489" font-size="10" class="mono" fill="#5F6368" text-anchor="middle" letter-spacing="0.5">DROP 06</text>

  <!-- more coming -->
  <g opacity="0.5">
    <line x1="1098" y1="300" x2="1150" y2="300" stroke="#DADCE0" stroke-width="3" stroke-dasharray="3,5"/>
    <path d="M 1142 292 L 1154 300 L 1142 308" stroke="#5F6368" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1124" y="336" font-size="10" class="mono" fill="#5F6368" text-anchor="middle" letter-spacing="0.5">more coming</text>
  </g>

  <!-- divider + footer -->
  <line x1="60" y1="596" x2="1140" y2="596" stroke="#E8EAED" stroke-width="1.5"/>
  <text x="60" y="628" font-size="11.5" class="mono" fill="#5F6368" letter-spacing="1">PERSONAL OS · LEADERSHIP LAYER</text>
  <rect x="922" y="615" width="22" height="22" rx="5" fill="#0A66C2"/>
  <text x="933" y="631" font-size="12.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">in</text>
  <text x="1140" y="631" font-size="13" font-weight="600" fill="#202124" text-anchor="end">Tomás Dostal Freire</text>
</svg>
